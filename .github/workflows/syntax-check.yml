name: Syntax Check

on:
  push:
  pull_request:

jobs:
  py-compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Python syntax
        run: python -m compileall training data_pipeline deployment
